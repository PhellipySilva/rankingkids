<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking · Beach Tennis Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════ -->
<header>
  <div class="header-content">
    <span class="header-icon">🎾</span>
    <h1 class="header-title">RANKING</h1>
    <p class="header-sub">BEACH TENNIS ACADEMY</p>
    <span class="semana-badge" id="semana-label"></span>
  </div>
</header>

<!-- ══ CONTAINER ═══════════════════════════════════════ -->
<div class="container">

  <!-- FILTROS -->
  <div class="filtros" id="filtros">
    <button class="filtro-btn ativo" data-cat="Todos">🌍 Todos</button>
    <button class="filtro-btn"       data-cat="Adulto">🎾 Adulto</button>
    <button class="filtro-btn"       data-cat="Kids">🧒 Kids</button>
  </div>

  <!-- BOTÃO ADMIN (discreto) -->
  <div class="admin-toggle">
    <button class="btn-admin" id="btn-toggle-admin" onclick="clicarAdmin()">
      🔒 Área do Professor
    </button>
  </div>

  <!-- PAINEL ADMIN -->
  <div class="painel-admin" id="painel-admin">
    <div class="painel-titulo">✏️ Editar Ranking — altere os pontos e clique em Salvar</div>
    <div class="editor-lista" id="editor-lista"></div>

    <div class="form-novo">
      <div class="form-campos">
        <div class="form-group">
          <label class="form-label">Nome do Aluno</label>
          <input class="form-input" id="novo-nome" placeholder="Ex: João Silva" />
        </div>
        <div class="form-group">
          <label class="form-label">Categoria</label>
          <select class="form-select" id="novo-cat">
            <option value="Adulto">Adulto</option>
            <option value="Kids">Kids</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Pontos iniciais</label>
          <input class="form-input" id="novo-pontos" type="number" placeholder="0" min="0" />
        </div>
      </div>
      <button class="btn-add" onclick="adicionarAluno()">＋ Adicionar Aluno</button>
    </div>

    <div class="botoes-admin">
      <button class="btn-sair-admin" onclick="sairAdmin()">Sair do Painel</button>
      <button class="btn-salvar"     onclick="salvarRanking()">✅ Salvar Ranking</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row" id="stats-row"></div>

  <!-- PÓDIO -->
  <div class="podio-wrapper" id="podio-wrapper"></div>

  <!-- TABELA -->
  <div class="ranking-card" id="ranking-card"></div>

</div>

<!-- ══ MODAL DE SENHA ══════════════════════════════════ -->
<div class="overlay" id="overlay" onclick="fecharSeClicarFora(event)">
  <div class="modal-senha">
    <div class="modal-icon">🔐</div>
    <div class="modal-titulo">Área Restrita</div>
    <div class="modal-sub">Digite a senha para acessar<br>o painel do professor</div>

    <div class="input-senha-wrap">
      <input
        class="input-senha"
        id="input-senha"
        type="password"
        placeholder="• • • • • • • •"
        maxlength="40"
        autocomplete="off"
        onkeydown="if(event.key==='Enter') verificarSenha()"
      />
      <button class="btn-olho" id="btn-olho" type="button" onclick="toggleVerSenha()">👁️</button>
    </div>

    <div class="msg-erro" id="msg-erro"></div>

    <div class="modal-btns">
      <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
      <button class="btn-entrar" id="btn-entrar" onclick="verificarSenha()">Entrar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>
<script src="js/script.js"></script>
</body>
</html>
