<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking · Beach Tennis Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* ═══════════════════════════════════════════════
     VARIÁVEIS & RESET
  ═══════════════════════════════════════════════ */
  :root {
    --court:       #1A6B4A;
    --court-dark:  #0D4A32;
    --court-light: #2A8A5E;
    --sky:         #1E7BB5;
    --gold:        #F59E0B;
    --silver:      #94A3B8;
    --bronze:      #C2692A;
    --danger:      #DC2626;
    --slate:       #1E293B;
    --muted:       #64748B;
    --line:        #E2E8F0;
    --bg:          #F1F5F0;
    --white:       #FFFFFF;
    --radius:      14px;
    --shadow:      0 2px 16px rgba(0,0,0,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--slate);
    min-height: 100vh;
  }

  /* ═══════════════════════════════════════════════
     HEADER
  ═══════════════════════════════════════════════ */
  header {
    background: linear-gradient(135deg, var(--court-dark) 0%, var(--court) 55%, #1E7BB5 100%);
    padding: clamp(28px, 5vw, 44px) 20px clamp(44px, 6vw, 60px);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 15% 90%, rgba(255,255,255,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 10%, rgba(255,255,255,0.09) 0%, transparent 50%);
  }
  header::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.04) 0px, rgba(255,255,255,0.04) 1px, transparent 1px, transparent 60px),
      repeating-linear-gradient(0deg,  rgba(255,255,255,0.04) 0px, rgba(255,255,255,0.04) 1px, transparent 1px, transparent 60px);
  }
  .header-content { position: relative; z-index: 1; }

  .header-icon {
    font-size: clamp(36px, 8vw, 52px);
    display: block;
    margin-bottom: 6px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    animation: bounce 2.5s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-6px); }
  }
  .header-title {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(32px, 10vw, 64px);
    letter-spacing: 4px;
    color: #fff;
    line-height: 1;
    text-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }
  .header-sub {
    color: rgba(255,255,255,0.75);
    font-size: clamp(12px, 2.5vw, 15px);
    margin-top: 6px;
    letter-spacing: 1px;
  }
  .semana-badge {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    padding: 5px 16px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-top: 12px;
  }

  /* ═══════════════════════════════════════════════
     CONTAINER
  ═══════════════════════════════════════════════ */
  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 clamp(12px, 4vw, 24px) 60px;
    transform: translateY(-28px);
  }

  /* ═══════════════════════════════════════════════
     FILTROS
  ═══════════════════════════════════════════════ */
  .filtros {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    justify-content: center;
  }
  .filtro-btn {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: clamp(12px, 3vw, 14px);
    padding: 9px clamp(16px, 4vw, 24px);
    border-radius: 999px;
    border: 2px solid var(--line);
    background: var(--white);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filtro-btn:hover  { border-color: var(--court); color: var(--court); }
  .filtro-btn.ativo  {
    background: var(--court);
    border-color: var(--court);
    color: #fff;
    box-shadow: 0 4px 14px rgba(26,107,74,0.35);
  }

  /* ═══════════════════════════════════════════════
     PÓDIO
  ═══════════════════════════════════════════════ */
  .podio-wrapper { margin-bottom: 20px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .podio {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    align-items: flex-end;
    gap: clamp(6px, 2vw, 14px);
    padding: 0 4px;
  }
  .podio-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    animation: fadeUp 0.5s ease both;
  }
  .podio-item:nth-child(1) { animation-delay: 0.1s; }
  .podio-item:nth-child(2) { animation-delay: 0.0s; }
  .podio-item:nth-child(3) { animation-delay: 0.2s; }

  .podio-avatar {
    width:  clamp(44px, 12vw, 58px);
    height: clamp(44px, 12vw, 58px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(15px, 4vw, 20px);
    color: #fff;
    margin-bottom: 6px;
    position: relative;
    border: 3px solid transparent;
    flex-shrink: 0;
  }
  .pos-1 .podio-avatar {
    width:  clamp(56px, 15vw, 70px);
    height: clamp(56px, 15vw, 70px);
    font-size: clamp(18px, 5vw, 24px);
    border-color: var(--gold);
    box-shadow: 0 0 0 4px rgba(245,158,11,0.2), 0 8px 24px rgba(245,158,11,0.3);
  }
  .podio-medal {
    position: absolute;
    top: -8px; right: -6px;
    font-size: clamp(16px, 4vw, 20px);
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  }
  .podio-nome {
    font-weight: 700;
    font-size: clamp(11px, 2.8vw, 14px);
    color: var(--slate);
    line-height: 1.2;
    margin-bottom: 3px;
    word-break: break-word;
  }
  .podio-pontos {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(20px, 5.5vw, 28px);
    letter-spacing: 1px;
    line-height: 1;
  }
  .pos-1 .podio-pontos { font-size: clamp(24px, 7vw, 34px); color: var(--gold); }
  .pos-2 .podio-pontos { color: var(--silver); }
  .pos-3 .podio-pontos { color: var(--bronze); }
  .podio-label { font-size: 10px; color: var(--muted); }

  .podio-plataforma { border-radius: 12px 12px 0 0; width: 100%; margin-top: 8px; }
  .pos-1 .podio-plataforma {
    background: linear-gradient(180deg, #FFFBEB, #FEF3C7);
    border: 2px solid rgba(245,158,11,0.3);
    height: clamp(40px, 8vw, 70px);
  }
  .pos-2 .podio-plataforma {
    background: linear-gradient(180deg, #F8FAFC, #F1F5F9);
    border: 2px solid rgba(148,163,184,0.3);
    height: clamp(28px, 6vw, 50px);
  }
  .pos-3 .podio-plataforma {
    background: linear-gradient(180deg, #FFF7ED, #FED7AA22);
    border: 2px solid rgba(194,105,42,0.25);
    height: clamp(20px, 4vw, 36px);
  }

  /* ═══════════════════════════════════════════════
     TABELA RANKING
  ═══════════════════════════════════════════════ */
  .ranking-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .ranking-header-row {
    display: grid;
    grid-template-columns: 42px 1fr 72px 76px;
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--line);
    background: #FAFAFA;
  }
  .ranking-row {
    display: grid;
    grid-template-columns: 42px 1fr 72px 76px;
    padding: clamp(10px, 2.5vw, 14px) clamp(12px, 3vw, 18px);
    align-items: center;
    border-bottom: 1px solid var(--line);
    transition: background 0.15s;
    animation: fadeUp 0.4s ease both;
  }
  .ranking-row:last-child { border-bottom: none; }
  .ranking-row:hover { background: #F8FAFC; }
  .ranking-row.top1 { background: linear-gradient(90deg, #FFFBEB 0%, #fff 60%); }
  .ranking-row.top2 { background: linear-gradient(90deg, #F8FAFC 0%, #fff 60%); }
  .ranking-row.top3 { background: linear-gradient(90deg, #FFF7ED 0%, #fff 60%); }

  .ranking-row:nth-child(1) { animation-delay: 0.05s; }
  .ranking-row:nth-child(2) { animation-delay: 0.10s; }
  .ranking-row:nth-child(3) { animation-delay: 0.15s; }
  .ranking-row:nth-child(4) { animation-delay: 0.20s; }
  .ranking-row:nth-child(5) { animation-delay: 0.25s; }
  .ranking-row:nth-child(6) { animation-delay: 0.30s; }

  .col-pos {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(18px, 4.5vw, 22px);
    color: var(--muted);
    text-align: center;
  }
  .col-pos.medal { font-size: clamp(20px, 5vw, 24px); }

  .col-aluno { display: flex; align-items: center; gap: 10px; min-width: 0; }

  .avatar-sm {
    width: clamp(32px, 8vw, 40px);
    height: clamp(32px, 8vw, 40px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(11px, 3vw, 14px);
    color: #fff;
    flex-shrink: 0;
  }

  .aluno-nome {
    font-weight: 700;
    font-size: clamp(12px, 3vw, 14px);
    color: var(--slate);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .aluno-cat { font-size: clamp(10px, 2.5vw, 12px); color: var(--muted); margin-top: 1px; }

  .col-pontos {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(20px, 5.5vw, 26px);
    color: var(--court);
    text-align: center;
    line-height: 1;
  }
  .col-pontos small {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-top: -2px;
  }

  .barra-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
  .barra-pct  { font-size: 11px; font-weight: 700; color: var(--muted); }
  .barra-track {
    width: clamp(48px, 11vw, 72px);
    height: 6px;
    background: var(--line);
    border-radius: 999px;
    overflow: hidden;
  }
  .barra-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--court-light), var(--court));
    transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .top1 .barra-fill { background: linear-gradient(90deg, #FCD34D, var(--gold)); }
  .top2 .barra-fill { background: linear-gradient(90deg, #CBD5E1, var(--silver)); }
  .top3 .barra-fill { background: linear-gradient(90deg, #FBA66D, var(--bronze)); }

  /* ═══════════════════════════════════════════════
     STATS
  ═══════════════════════════════════════════════ */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(8px, 2.5vw, 14px);
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: clamp(12px, 3vw, 18px);
    text-align: center;
    box-shadow: var(--shadow);
    animation: fadeUp 0.4s ease both;
  }
  .stat-card:nth-child(1) { animation-delay: 0.0s; }
  .stat-card:nth-child(2) { animation-delay: 0.1s; }
  .stat-card:nth-child(3) { animation-delay: 0.2s; }
  .stat-val {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(24px, 7vw, 34px);
    color: var(--court);
    line-height: 1;
  }
  .stat-lbl {
    font-size: clamp(9px, 2.2vw, 11px);
    color: var(--muted);
    font-weight: 600;
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ═══════════════════════════════════════════════
     BOTÃO ADMIN — discreto, no rodapé visual
  ═══════════════════════════════════════════════ */
  .admin-toggle {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }
  .btn-admin {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 12px;
    padding: 7px 18px;
    border-radius: 999px;
    border: 1.5px solid var(--line);
    background: var(--white);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: var(--shadow);
  }
  .btn-admin:hover { border-color: var(--court); color: var(--court); }
  .btn-admin.ativo { background: var(--court-dark); border-color: var(--court-dark); color: #fff; }

  /* ═══════════════════════════════════════════════
     OVERLAY + MODAL DE SENHA
  ═══════════════════════════════════════════════ */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    z-index: 900;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .overlay.show { display: flex; }

  .modal-senha {
    background: var(--white);
    border-radius: 20px;
    padding: clamp(24px, 5vw, 36px);
    width: 100%;
    max-width: 340px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.25);
    animation: fadeUp 0.3s ease;
    text-align: center;
  }
  .modal-icon   { font-size: 40px; margin-bottom: 10px; }
  .modal-titulo { font-size: 18px; font-weight: 700; color: var(--slate); margin-bottom: 4px; }
  .modal-sub    { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }

  .input-senha-wrap { position: relative; margin-bottom: 10px; }
  .input-senha {
    width: 100%;
    padding: 12px 44px 12px 16px;
    border: 2px solid var(--line);
    border-radius: 10px;
    font-size: 18px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    letter-spacing: 4px;
    text-align: center;
    color: var(--slate);
    background: #F8FAFC;
  }
  .input-senha:focus { border-color: var(--court); background: #fff; }
  .input-senha.erro  { border-color: var(--danger); animation: shake 0.35s ease; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60%  { transform: translateX(-8px); }
    40%, 80%  { transform: translateX( 8px); }
  }

  .btn-olho {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
    color: var(--muted);
    padding: 0;
    line-height: 1;
  }

  .msg-erro {
    font-size: 12px;
    color: var(--danger);
    font-weight: 600;
    min-height: 18px;
    margin-bottom: 14px;
  }

  .modal-btns { display: flex; gap: 10px; }
  .btn-cancelar {
    flex: 1;
    padding: 11px;
    border-radius: 10px;
    border: 2px solid var(--line);
    background: transparent;
    color: var(--muted);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .btn-cancelar:hover { border-color: var(--muted); }
  .btn-entrar {
    flex: 1;
    padding: 11px;
    border-radius: 10px;
    border: none;
    background: var(--court);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .btn-entrar:hover { background: var(--court-dark); }
  .btn-entrar:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ═══════════════════════════════════════════════
     PAINEL ADMIN
  ═══════════════════════════════════════════════ */
  .painel-admin {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    overflow: hidden;
    display: none;
  }
  .painel-admin.visivel { display: block; animation: fadeUp 0.3s ease; }

  .painel-titulo {
    background: linear-gradient(90deg, var(--court-dark), var(--court));
    color: #fff;
    padding: 13px 18px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .editor-lista { padding: 14px; display: flex; flex-direction: column; gap: 10px; }

  .editor-row {
    display: grid;
    grid-template-columns: 1fr clamp(80px, 22vw, 120px) 38px;
    gap: 10px;
    align-items: center;
    padding: 10px 12px;
    background: #F8FAFC;
    border-radius: 10px;
    border: 1px solid var(--line);
  }
  .editor-nome {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: clamp(12px, 3vw, 14px);
    color: var(--slate);
    min-width: 0;
  }
  .editor-nome .txt  { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 1; }
  .editor-nome .cat  { font-size: 11px; color: var(--muted); font-weight: 400; flex-shrink: 0; }

  .input-pontos {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(18px, 5vw, 22px);
    text-align: center;
    padding: 7px 8px;
    border: 2px solid var(--line);
    border-radius: 8px;
    color: var(--court);
    background: var(--white);
    width: 100%;
    transition: border-color 0.2s;
    outline: none;
  }
  .input-pontos:focus { border-color: var(--court); }

  .btn-remover {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: none;
    background: #FEE2E2;
    color: var(--danger);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .btn-remover:hover { background: var(--danger); color: #fff; }

  /* form novo aluno */
  .form-novo {
    padding: 14px;
    border-top: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .form-campos {
    display: grid;
    grid-template-columns: 1fr 1fr clamp(80px, 22vw, 110px);
    gap: 8px;
  }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .form-input, .form-select {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 9px 11px;
    border: 2px solid var(--line);
    border-radius: 8px;
    outline: none;
    background: var(--white);
    color: var(--slate);
    transition: border-color 0.2s;
    width: 100%;
  }
  .form-input:focus, .form-select:focus { border-color: var(--court); }

  .btn-add {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 11px 18px;
    border-radius: 8px;
    border: none;
    background: var(--court);
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .btn-add:hover { background: var(--court-dark); }

  .botoes-admin {
    padding: 0 14px 14px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .btn-salvar {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    background: var(--gold);
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-salvar:hover { background: #D97706; }
  .btn-sair-admin {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 10px 18px;
    border-radius: 8px;
    border: 1.5px solid var(--line);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-sair-admin:hover { border-color: var(--danger); color: var(--danger); }

  /* ═══════════════════════════════════════════════
     VAZIO
  ═══════════════════════════════════════════════ */
  .vazio { text-align: center; padding: clamp(32px, 8vw, 52px) 20px; color: var(--muted); }
  .vazio-icon { font-size: 36px; margin-bottom: 10px; }
  .vazio-txt  { font-size: 14px; }

  /* ═══════════════════════════════════════════════
     TOAST
  ═══════════════════════════════════════════════ */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--slate);
    color: #fff;
    padding: 12px 24px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    z-index: 999;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    max-width: calc(100vw - 32px);
    text-align: center;
  }
  .toast.show    { transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--court); }
  .toast.error   { background: var(--danger); }

  /* ═══════════════════════════════════════════════
     RESPONSIVO — ajustes mobile
  ═══════════════════════════════════════════════ */
  @media (max-width: 480px) {
    .ranking-header-row,
    .ranking-row { grid-template-columns: 36px 1fr 60px 64px; padding: 10px 12px; }
    .form-campos { grid-template-columns: 1fr 1fr; }
    .form-campos .form-group:last-child { grid-column: span 2; }
    .editor-row { grid-template-columns: 1fr clamp(72px, 22vw, 100px) 36px; gap: 8px; }
  }

  @media (max-width: 360px) {
    .ranking-header-row,
    .ranking-row { grid-template-columns: 32px 1fr 54px 0px; }
    .barra-wrap  { display: none; }
    .podio-plataforma { display: none; }
  }
</style>
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════ -->
<header>
  <div class="header-content">
    <span class="header-icon">🎾</span>
    <h1 class="header-title">RANKING</h1>
    <p class="header-sub">BEACH TENNIS ACADEMY</p>
    <span class="semana-badge" id="semana-label"></span>
  </div>
</header>

<!-- ══ CONTAINER ═══════════════════════════════════════ -->
<div class="container">

  <!-- FILTROS -->
  <div class="filtros" id="filtros">
    <button class="filtro-btn ativo" data-cat="Todos">🌍 Todos</button>
    <button class="filtro-btn"       data-cat="Adulto">🎾 Adulto</button>
    <button class="filtro-btn"       data-cat="Kids">🧒 Kids</button>
  </div>

  <!-- BOTÃO ADMIN (discreto) -->
  <div class="admin-toggle">
    <button class="btn-admin" id="btn-toggle-admin" onclick="clicarAdmin()">
      🔒 Área do Professor
    </button>
  </div>

  <!-- PAINEL ADMIN -->
  <div class="painel-admin" id="painel-admin">
    <div class="painel-titulo">✏️ Editar Ranking — altere os pontos e clique em Salvar</div>
    <div class="editor-lista" id="editor-lista"></div>

    <div class="form-novo">
      <div class="form-campos">
        <div class="form-group">
          <label class="form-label">Nome do Aluno</label>
          <input class="form-input" id="novo-nome" placeholder="Ex: João Silva" />
        </div>
        <div class="form-group">
          <label class="form-label">Categoria</label>
          <select class="form-select" id="novo-cat">
            <option value="Adulto">Adulto</option>
            <option value="Kids">Kids</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Pontos iniciais</label>
          <input class="form-input" id="novo-pontos" type="number" placeholder="0" min="0" />
        </div>
      </div>
      <button class="btn-add" onclick="adicionarAluno()">＋ Adicionar Aluno</button>
    </div>

    <div class="botoes-admin">
      <button class="btn-sair-admin" onclick="sairAdmin()">Sair do Painel</button>
      <button class="btn-salvar"     onclick="salvarRanking()">✅ Salvar Ranking</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row" id="stats-row"></div>

  <!-- PÓDIO -->
  <div class="podio-wrapper" id="podio-wrapper"></div>

  <!-- TABELA -->
  <div class="ranking-card" id="ranking-card"></div>

</div>

<!-- ══ MODAL DE SENHA ══════════════════════════════════ -->
<div class="overlay" id="overlay" onclick="fecharSeClicarFora(event)">
  <div class="modal-senha">
    <div class="modal-icon">🔐</div>
    <div class="modal-titulo">Área Restrita</div>
    <div class="modal-sub">Digite a senha para acessar<br>o painel do professor</div>

    <div class="input-senha-wrap">
      <input
        class="input-senha"
        id="input-senha"
        type="password"
        placeholder="• • • • • • • •"
        maxlength="40"
        autocomplete="off"
        onkeydown="if(event.key==='Enter') verificarSenha()"
      />
      <button class="btn-olho" id="btn-olho" type="button" onclick="toggleVerSenha()">👁️</button>
    </div>

    <div class="msg-erro" id="msg-erro"></div>

    <div class="modal-btns">
      <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
      <button class="btn-entrar" id="btn-entrar" onclick="verificarSenha()">Entrar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>


<!-- ══════════════════════════════════════════════════════
     JAVASCRIPT — LÓGICA COMPLETA
══════════════════════════════════════════════════════ -->
<script>

/* ═══════════════════════════════════════════════════
   ⚙️  CONFIGURAÇÃO — edite apenas esta seção
═══════════════════════════════════════════════════ */

// 🔑 SENHA DO PAINEL ADMIN — troque para a sua senha
const SENHA_ADMIN = "beach2025";

// Bloqueio após X tentativas erradas
const MAX_TENTATIVAS    = 5;
const BLOQUEIO_MINUTOS  = 2;

/* ═══════════════════════════════════════════════════
   📋 DADOS DOS ALUNOS
   Edite à vontade. Categorias válidas: "Adulto" | "Kids"
═══════════════════════════════════════════════════ */
let alunos = [
  { id: 1,  nome: "Rafael Torres",  categoria: "Adulto", pontos: 1100 },
  { id: 2,  nome: "Bruna Santos",   categoria: "Adulto", pontos: 920  },
  { id: 3,  nome: "Diego Ferreira", categoria: "Adulto", pontos: 755  },
  { id: 4,  nome: "Ana Lima",       categoria: "Adulto", pontos: 680  },
  { id: 5,  nome: "Lucas Souza",    categoria: "Kids",   pontos: 850  },
  { id: 6,  nome: "Miguel Costa",   categoria: "Kids",   pontos: 720  },
  { id: 7,  nome: "Sofia Mendes",   categoria: "Kids",   pontos: 640  },
  { id: 8,  nome: "Pedro Alves",    categoria: "Kids",   pontos: 530  },
  { id: 9,  nome: "Julia Rocha",    categoria: "Kids",   pontos: 490  },
];

/* ═══════════════════════════════════════════════════
   ESTADO INTERNO
═══════════════════════════════════════════════════ */
let categoriaAtiva = "Todos";
let adminAberto    = false;
let proximoId      = 200;
let tentativas     = 0;
let bloqueadoAte   = null;

/* ═══════════════════════════════════════════════════
   UTILITÁRIOS — AVATAR
═══════════════════════════════════════════════════ */
const paleta = ["#1A6B4A","#1E7BB5","#7C3AED","#DB2777","#059669","#D97706","#0E7490","#B45309"];

function corAvatar(nome) {
  let h = 0;
  for (let i = 0; i < nome.length; i++) h = nome.charCodeAt(i) + ((h << 5) - h);
  return paleta[Math.abs(h) % paleta.length];
}
function iniciais(nome) {
  return nome.trim().split(/\s+/).map(p => p[0]).join("").slice(0, 2).toUpperCase();
}

/* ═══════════════════════════════════════════════════
   CORE — CALCULAR RANKING
   Regras:
   1. Ordena por pontos (maior → menor)
   2. Empates recebem a mesma posição
   3. Posição seguinte pula o número (ex: 1, 2, 2, 4)
═══════════════════════════════════════════════════ */
function calcularRanking(lista) {
  const sorted = [...lista].sort((a, b) => b.pontos - a.pontos);
  let posAtual = 1;
  return sorted.map((aluno, i) => {
    if (i > 0 && aluno.pontos < sorted[i - 1].pontos) posAtual = i + 1;
    return { ...aluno, posicao: posAtual };
  });
}

function pctPontos(pontos, max) {
  return max === 0 ? 0 : Math.round((pontos / max) * 100);
}

/* ═══════════════════════════════════════════════════
   FILTRAR POR CATEGORIA
═══════════════════════════════════════════════════ */
function filtrarAlunos() {
  return categoriaAtiva === "Todos"
    ? alunos
    : alunos.filter(a => a.categoria === categoriaAtiva);
}

/* ═══════════════════════════════════════════════════
   RENDER — ESTATÍSTICAS
═══════════════════════════════════════════════════ */
function renderStats(ranking) {
  const max  = ranking[0]?.pontos || 0;
  const cats = [...new Set(ranking.map(a => a.categoria))].length;
  document.getElementById("stats-row").innerHTML = `
    <div class="stat-card">
      <div class="stat-val">${ranking.length}</div>
      <div class="stat-lbl">Participantes</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${max}</div>
      <div class="stat-lbl">Maior Pontuação</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${cats}</div>
      <div class="stat-lbl">${cats === 1 ? "Categoria" : "Categorias"}</div>
    </div>
  `;
}

/* ═══════════════════════════════════════════════════
   RENDER — PÓDIO (top 3, só em categoria específica)
═══════════════════════════════════════════════════ */
function renderPodio(ranking) {
  const w = document.getElementById("podio-wrapper");
  if (categoriaAtiva === "Todos" || ranking.length < 3) { w.innerHTML = ""; return; }

  const top   = ranking.slice(0, 3);
  const ordem = [top[1], top[0], top[2]];      // visual: 2°, 1°, 3°
  const cls   = ["pos-2", "pos-1", "pos-3"];
  const med   = ["🥈",    "🥇",    "🥉"];

  w.innerHTML = `
    <div class="podio">
      ${ordem.map((a, i) => `
        <div class="podio-item ${cls[i]}">
          <div class="podio-avatar" style="background:${corAvatar(a.nome)}">
            ${iniciais(a.nome)}
            <span class="podio-medal">${med[i]}</span>
          </div>
          <div class="podio-nome">${a.nome}</div>
          <div class="podio-pontos">${a.pontos}</div>
          <div class="podio-label">pontos</div>
          <div class="podio-plataforma"></div>
        </div>
      `).join("")}
    </div>
  `;
}

/* ═══════════════════════════════════════════════════
   RENDER — TABELA
═══════════════════════════════════════════════════ */
function medalha(pos) {
  return pos === 1 ? "🥇" : pos === 2 ? "🥈" : pos === 3 ? "🥉" : pos;
}
function classeRow(pos) {
  return pos === 1 ? "top1" : pos === 2 ? "top2" : pos === 3 ? "top3" : "";
}

function renderTabela(ranking) {
  const card   = document.getElementById("ranking-card");
  const maxPts = ranking[0]?.pontos || 1;

  if (ranking.length === 0) {
    card.innerHTML = `
      <div class="vazio">
        <div class="vazio-icon">🏖️</div>
        <div class="vazio-txt">Nenhum aluno nesta categoria ainda.</div>
      </div>`;
    return;
  }

  card.innerHTML = `
    <div class="ranking-header-row">
      <div style="text-align:center">#</div>
      <div>Aluno</div>
      <div style="text-align:center">Pts</div>
      <div style="text-align:right">Aproveit.</div>
    </div>
    ${ranking.map(a => {
      const pct = pctPontos(a.pontos, maxPts);
      return `
        <div class="ranking-row ${classeRow(a.posicao)}">
          <div class="col-pos ${a.posicao <= 3 ? "medal" : ""}">${medalha(a.posicao)}</div>
          <div class="col-aluno">
            <div class="avatar-sm" style="background:${corAvatar(a.nome)}">${iniciais(a.nome)}</div>
            <div class="aluno-info">
              <div class="aluno-nome">${a.nome}</div>
              <div class="aluno-cat">${a.categoria}</div>
            </div>
          </div>
          <div class="col-pontos">${a.pontos}<small>pts</small></div>
          <div class="barra-wrap">
            <span class="barra-pct">${pct}%</span>
            <div class="barra-track">
              <div class="barra-fill" style="width:${pct}%"></div>
            </div>
          </div>
        </div>
      `;
    }).join("")}
  `;
}

/* ═══════════════════════════════════════════════════
   RENDER — EDITOR ADMIN
═══════════════════════════════════════════════════ */
function renderEditor() {
  const ranking = calcularRanking(filtrarAlunos());
  document.getElementById("editor-lista").innerHTML = ranking.map(a => `
    <div class="editor-row">
      <div class="editor-nome">
        <div class="avatar-sm" style="background:${corAvatar(a.nome)};width:30px;height:30px;font-size:11px;flex-shrink:0">
          ${iniciais(a.nome)}
        </div>
        <span class="txt">${a.nome}</span>
        <span class="cat">${a.categoria}</span>
      </div>
      <input class="input-pontos" type="number" min="0" value="${a.pontos}" data-id="${a.id}" />
      <button class="btn-remover" onclick="removerAluno(${a.id})" title="Remover aluno">✕</button>
    </div>
  `).join("");
}

/* ═══════════════════════════════════════════════════
   RENDER — TUDO
═══════════════════════════════════════════════════ */
function renderizar() {
  const ranking = calcularRanking(filtrarAlunos());
  renderStats(ranking);
  renderPodio(ranking);
  renderTabela(ranking);
  if (adminAberto) renderEditor();
}

/* ═══════════════════════════════════════════════════
   FILTROS
═══════════════════════════════════════════════════ */
document.getElementById("filtros").addEventListener("click", function(e) {
  if (!e.target.matches(".filtro-btn")) return;
  categoriaAtiva = e.target.dataset.cat;
  document.querySelectorAll(".filtro-btn").forEach(b => b.classList.remove("ativo"));
  e.target.classList.add("ativo");
  renderizar();
});

/* ═══════════════════════════════════════════════════
   MODAL DE SENHA — CONTROLE DE ACESSO
═══════════════════════════════════════════════════ */
function clicarAdmin() {
  // Se já está no painel, sai
  if (adminAberto) { sairAdmin(); return; }

  // Verifica bloqueio ativo
  if (bloqueadoAte && Date.now() < bloqueadoAte) {
    const seg = Math.ceil((bloqueadoAte - Date.now()) / 1000);
    toast(`⛔ Aguarde ${seg}s para tentar novamente.`, "error");
    return;
  }

  // Abre o modal
  document.getElementById("overlay").classList.add("show");
  document.getElementById("input-senha").value = "";
  document.getElementById("msg-erro").textContent = "";
  document.getElementById("input-senha").classList.remove("erro");
  document.getElementById("btn-entrar").disabled = false;
  setTimeout(() => document.getElementById("input-senha").focus(), 80);
}

function fecharModal() {
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("input-senha").value = "";
  document.getElementById("msg-erro").textContent = "";
  document.getElementById("input-senha").classList.remove("erro");
}

function fecharSeClicarFora(e) {
  if (e.target === document.getElementById("overlay")) fecharModal();
}

function toggleVerSenha() {
  const inp = document.getElementById("input-senha");
  const btn = document.getElementById("btn-olho");
  inp.type     = inp.type === "password" ? "text"     : "password";
  btn.textContent = inp.type === "password" ? "👁️" : "🙈";
}

function verificarSenha() {
  // Bloqueia se ainda no período de espera
  if (bloqueadoAte && Date.now() < bloqueadoAte) {
    const seg = Math.ceil((bloqueadoAte - Date.now()) / 1000);
    document.getElementById("msg-erro").textContent = `Aguarde ${seg}s.`;
    return;
  }

  const digitado = document.getElementById("input-senha").value;

  if (digitado === SENHA_ADMIN) {
    // ✅ Senha correta
    tentativas = 0;
    fecharModal();
    abrirAdmin();
    toast("✅ Bem-vindo, professor!", "success");

  } else {
    // ❌ Senha errada
    tentativas++;

    const inp    = document.getElementById("input-senha");
    const msgEl  = document.getElementById("msg-erro");
    const restam = MAX_TENTATIVAS - tentativas;

    // Animação de erro
    inp.classList.remove("erro");
    void inp.offsetWidth;
    inp.classList.add("erro");
    inp.value = "";
    inp.focus();

    if (tentativas >= MAX_TENTATIVAS) {
      // Bloqueia por X minutos
      const ms     = BLOQUEIO_MINUTOS * 60 * 1000;
      bloqueadoAte = Date.now() + ms;
      tentativas   = 0;

      document.getElementById("btn-entrar").disabled = true;
      msgEl.textContent = `Muitas tentativas. Aguarde ${BLOQUEIO_MINUTOS} minuto(s).`;

      // Countdown visual
      const intervalo = setInterval(() => {
        if (!bloqueadoAte || Date.now() >= bloqueadoAte) {
          clearInterval(intervalo);
          bloqueadoAte = null;
          document.getElementById("btn-entrar").disabled = false;
          msgEl.textContent = "";
          return;
        }
        const seg = Math.ceil((bloqueadoAte - Date.now()) / 1000);
        msgEl.textContent = `Aguarde ${seg}s para tentar novamente.`;
      }, 1000);

    } else {
      msgEl.textContent = restam === 1
        ? `Senha incorreta. Última tentativa!`
        : `Senha incorreta. ${restam} tentativas restantes.`;
    }
  }
}

/* ═══════════════════════════════════════════════════
   ADMIN — ABRIR / FECHAR PAINEL
═══════════════════════════════════════════════════ */
function abrirAdmin() {
  adminAberto = true;
  const btn   = document.getElementById("btn-toggle-admin");
  btn.textContent = "🔓 Sair do Painel";
  btn.classList.add("ativo");
  document.getElementById("painel-admin").classList.add("visivel");
  renderEditor();
}

function sairAdmin() {
  adminAberto = false;
  const btn   = document.getElementById("btn-toggle-admin");
  btn.textContent = "🔒 Área do Professor";
  btn.classList.remove("ativo");
  document.getElementById("painel-admin").classList.remove("visivel");
  toast("👋 Painel fechado.", "success");
}

/* ═══════════════════════════════════════════════════
   ADMIN — SALVAR RANKING
═══════════════════════════════════════════════════ */
function salvarRanking() {
  document.querySelectorAll(".input-pontos[data-id]").forEach(input => {
    const id     = parseInt(input.dataset.id);
    const pontos = Math.max(0, parseInt(input.value) || 0);
    const aluno  = alunos.find(a => a.id === id);
    if (aluno) aluno.pontos = pontos;
  });
  renderizar();
  toast("✅ Ranking atualizado com sucesso!", "success");
}

/* ═══════════════════════════════════════════════════
   ADMIN — ADICIONAR ALUNO
═══════════════════════════════════════════════════ */
function adicionarAluno() {
  const nome   = document.getElementById("novo-nome").value.trim();
  const cat    = document.getElementById("novo-cat").value;
  const pontos = Math.max(0, parseInt(document.getElementById("novo-pontos").value) || 0);

  if (!nome) { toast("⚠️ Digite o nome do aluno.", "error"); return; }

  alunos.push({ id: proximoId++, nome, categoria: cat, pontos });

  document.getElementById("novo-nome").value   = "";
  document.getElementById("novo-pontos").value = "";

  // Se o novo aluno é de categoria diferente do filtro atual, volta p/ Todos
  if (categoriaAtiva !== "Todos" && categoriaAtiva !== cat) {
    categoriaAtiva = "Todos";
    document.querySelectorAll(".filtro-btn").forEach(b =>
      b.classList.toggle("ativo", b.dataset.cat === "Todos")
    );
  }

  renderizar();
  toast(`➕ ${nome} adicionado ao ranking!`, "success");
}

/* ═══════════════════════════════════════════════════
   ADMIN — REMOVER ALUNO
═══════════════════════════════════════════════════ */
function removerAluno(id) {
  const aluno = alunos.find(a => a.id === id);
  if (!aluno) return;
  if (!confirm(`Remover "${aluno.nome}" do ranking?`)) return;
  alunos = alunos.filter(a => a.id !== id);
  renderizar();
  toast(`🗑️ ${aluno.nome} removido.`, "success");
}

/* ═══════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════ */
let toastTimer;
function toast(msg, tipo = "success") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className   = `toast ${tipo} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 3200);
}

/* ═══════════════════════════════════════════════════
   SEMANA AUTOMÁTICA NO HEADER
═══════════════════════════════════════════════════ */
(function() {
  const agora  = new Date();
  const inicio = new Date(agora.getFullYear(), 0, 1);
  const sem    = Math.ceil(((agora - inicio) / 86400000 + inicio.getDay() + 1) / 7);
  const meses  = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  document.getElementById("semana-label").textContent =
    `📅 Semana ${sem} · ${meses[agora.getMonth()]} ${agora.getFullYear()}`;
})();

/* ═══════════════════════════════════════════════════
   INICIALIZAR
═══════════════════════════════════════════════════ */
renderizar();
</script>
</body>
</html>
